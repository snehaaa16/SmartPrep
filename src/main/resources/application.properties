spring.application.name=backend
# Server Port (The port our backend will run on)
server.port=8080

# MySQL Database Connection Details
spring.datasource.url=jdbc:mysql://localhost:3306/antigravity_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# IMPORTANT: Do NOT commit secrets. Move secret values to a local file named
# `application-secrets.properties` at the project root and DO NOT commit it.
# Example placeholders are provided in application-secrets.properties.example.
# spring.datasource.password=YOUR_DB_PASSWORD  <-- move to application-secrets.properties
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA Settings
# 'update' automatically creates tables based on our Java code
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# AI Configuration
# gemini.api.key=YOUR_GEMINI_API_KEY  <-- move to application-secrets.properties

# Load local, non-committed secrets if present (optional). Create a file named
# `application-secrets.properties` at the project root and add your secret values
# there. This import is optional so the app will still start in environments where
# the secrets file is not present (e.g., CI with proper env vars).
spring.config.import=optional:file:./application-secrets.properties

